services:
  # 🔹 Frontend (Vite React)
  - type: static
    name: mithiverse-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # 🔹 Backend (Express)
  - type: web
    name: mithiverse-backend
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production